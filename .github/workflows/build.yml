name: Build Revda for macOS Silicon
on:
  workflow_dispatch: # 手动触发构建
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update Submodules to Latest
        run: |
          git submodule update --init --recursive --remote

      - name: Install System Dependencies
        run: |
          brew install ffmpeg mpv pkg-config yarn --quiet

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: 'Revda/yarn.lock'

      - name: Build dmlive (Backend)
        run: |
          cd dmlive
          cargo build --release --target aarch64-apple-darwin
          mkdir -p ../Revda/src-tauri/bin
          cp target/aarch64-apple-darwin/release/dmlive ../Revda/src-tauri/bin/dmlive-aarch64-apple-darwin

      - name: Build Revda (Frontend & App Bundle)
        run: |
          cd Revda
          yarn install --frozen-lockfile
          yarn build
          sed -i '' 's/"targets": "deb"/"targets": "all"/g' src-tauri/tauri.conf.json          
          sed -i '' 's/"externalBin": \[\]/"externalBin": \["bin\/dmlive"\]/g' src-tauri/tauri.conf.json          
          yarn tauri build --target aarch64-apple-darwin

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Revda-macOS-Silicon
          path: |
            Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
