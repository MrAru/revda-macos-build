name: Build and Release Revda
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  check_and_build:
    runs-on: macos-latest
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update Submodules to Latest
        id: check_changes
        run: |
          git submodule update --init --recursive --remote
          if [ -n "$(git status --porcelain)" ]; then
            echo "detected_changes=true" >> $GITHUB_ENV
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "detected_changes=false" >> $GITHUB_ENV
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set Version Tag
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        id: set_version
        run: |
          VERSION="$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install System Dependencies
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: brew install ffmpeg mpv pkg-config yarn --quiet

      - name: Setup Rust
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: 'Revda/yarn.lock'

      - name: Build dmlive (Backend)
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd dmlive
          cargo build --release --target aarch64-apple-darwin
          mkdir -p ../Revda/src-tauri/bin
          cp target/aarch64-apple-darwin/release/dmlive ../Revda/src-tauri/bin/dmlive-aarch64-apple-darwin

      - name: Build Revda (Frontend & App Bundle)
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd Revda
          yarn install
          sed -i '' 's/"targets": "deb"/"targets": "dmg"/g' src-tauri/tauri.conf.json
          sed -i '' 's/"externalBin": \[\]/"externalBin": \["bin\/dmlive"\]/g' src-tauri/tauri.conf.json
          yarn tauri build --target aarch64-apple-darwin

      - name: Commit Updated Submodules
        if: env.detected_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update submodules [skip ci]"
          git push

      - name: Calculate SHA256
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        id: shasum
        run: |
          DMG_PATH=$(ls Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Revda Silicon Build ${{ env.VERSION }}
          body: |
            ## Build Summary
            - **Build**: ${{ env.VERSION }}
            - **DMG SHA256**: `${{ steps.shasum.outputs.sha256 }}`
          files: Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false

      - name: Upload Artifact (Backup)
        if: env.detected_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Revda-${{ env.VERSION }}
          path: Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
