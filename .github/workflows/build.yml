name: Build Revda for macOS Silicon
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update Submodules to Latest
        id: check_changes
        run: |
          git submodule update --init --recursive --remote
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_ENV
          else
            echo "changed=false" >> $GITHUB_ENV
          fi

      - name: Apply Patch to dmlive
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd Revda/dmlive
          git apply ../../patches/macos_ffmpeg.patch

      - name: Install System Dependencies
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: brew install ffmpeg mpv pkg-config yarn --quiet

      - name: Setup Rust
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: 'Revda/yarn.lock'

      - name: Build dmlive binary
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd Revda/dmlive
          cargo build --release --target aarch64-apple-darwin
          mkdir -p ../src-tauri/bin
          cp target/aarch64-apple-darwin/release/dmlive ../src-tauri/bin/dmlive-aarch64-apple-darwin

      - name: Build Revda (Frontend & App Bundle)
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd Revda
          yarn install --frozen-lockfile
          yarn build
          sed -i '' 's/"targets": "deb"/"targets": "all"/g' src-tauri/tauri.conf.json
          sed -i '' 's/"externalBin": \[\]/"externalBin": \["bin\/dmlive"\]/g' src-tauri/tauri.conf.json
          yarn tauri build --target aarch64-apple-darwin

      - name: Commit Updated Submodules
        if: env.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Revda
          git commit -m "chore: update submodules [skip ci]"
          git push

      - name: Set Version
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Calculate SHA256
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: shasum
        run: |
          DMG_PATH=$(ls Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          echo "sha256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Revda Silicon Build ${{ env.VERSION }}
          body: |
            - **Build**: ${{ env.VERSION }}
            - **DMG SHA256**: `${{ steps.shasum.outputs.sha256 }}`
          files: Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false

      - name: Upload Artifact
        if: env.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: Revda-${{ env.VERSION }}
          path: |
            Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            Revda/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
